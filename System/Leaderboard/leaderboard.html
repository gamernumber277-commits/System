<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bubble-layer" aria-hidden="true">
        <span class="bubble bubble-1"></span>
        <span class="bubble bubble-2"></span>
        <span class="bubble bubble-3"></span>
        <span class="bubble bubble-4"></span>
        <span class="bubble bubble-5"></span>
        <span class="bubble bubble-6"></span>
        <span class="bubble bubble-7"></span>
        <span class="bubble bubble-8"></span>
    </div>

    <div class="main-container">
        <div class="game-top-nav">
            <button class="game-top-nav-btn" type="button" onclick="window.location.href='leaderboard.html?game=maze'">Maze</button>
            <button class="game-top-nav-btn" type="button" onclick="window.location.href='leaderboard.html?game=iqgame'">IQ Game</button>
            <button class="game-top-nav-btn" type="button" onclick="window.location.href='leaderboard.html?game=platform'">Platform</button>
        </div>

        <div class="header-row">
            <div class="search-box">
                <label>SEARCH BY NAME ONLY</label>
                <input type="text" id="searchInput" placeholder="Enter name...">
            </div>
            <button class="exit-btn" onclick="history.back()">x</button>
        </div>

        <div class="table-container">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>RANK</th>
                        <th>NAME</th>
                        <th>ID</th>
                        <th>TIME</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div id="slidingCard" class="sliding-card">
            <h1 id="cardName">PLAYER NAME</h1>
            <h2 id="cardScore">TIME: --</h2>
            <div class="details">
                <p id="cardAge">ID: --</p>
                <p id="cardLoc">PLAYED: --</p>
            </div>
            <button class="close-card-btn" onclick="toggleCard(false)">CLOSE</button>
        </div>
    </div>

    <script src="myScript.js"></script>
</body>
</html>
